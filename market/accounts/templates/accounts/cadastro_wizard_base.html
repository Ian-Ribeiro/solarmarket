{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - SolarMarket</title>

    <!-- CSS GLOBAL -->
    <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/typography.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/forms.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/buttons.css' %}">

    <!-- CSS ESPECÍFICO DO WIZARD -->
    <link rel="stylesheet" href="{% static 'core/css/account/cadastro_wizard_base.css' %}">
</head>

<body>

{% include 'core/header.html' %}

<main class="wizard-container">

    <h2 class="wizard-step-title">
        Etapa {{ wizard.steps.step1 }} de {{ wizard.steps.count }}
    </h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ wizard.management_form }}

        <div class="wizard-form-block">
            {% block form_content %}
            {% endblock %}
        </div>

        <div class="wizard-actions">
            {% if wizard.steps.prev %}
                <button class="btn btn-secondary" name="wizard_goto_step" value="{{ wizard.steps.prev }}">
                    Voltar
                </button>
            {% endif %}

            <button class="btn btn-primary" type="submit">
                Continuar
            </button>
        </div>

    </form>

</main>

</body>
</html>
