{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/typography.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/buttons.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/forms.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/account/login.css' %}">
</head>

<body>

{% include 'core/header.html' %}

<div class="login-container">

    <h1>Entrar</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn btn-primary" type="submit">Entrar</button>
    </form>

</div>

</body>
</html>
