{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Foto</title>

    <link rel="stylesheet" href="{% static 'core/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/typography.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/buttons.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/components/forms.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/account/editar_foto.css' %}">
</head>

<body>

{% include 'core/header.html' %}

<div class="edit-photo-container">

    <h1>Editar Foto de Perfil</h1>

    <div class="edit-photo-preview">
        {% if profile.foto %}
            <img src="{{ profile.foto.url }}" alt="Foto atual">
        {% else %}
            <img src="{% static 'img/default_user.png' %}" alt="Sem foto">
        {% endif %}
    </div>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Salvar</button>
    </form>

</div>

</body>
</html>
